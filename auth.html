<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Saathi - Portal Access</title>
    <style>
        body { background-color: #f8fafc; margin: 0; padding: 20px; font-family: system-ui, -apple-system, sans-serif; }
        .mesh-auth-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); width: 100%; max-width: 420px; margin: 80px auto; }
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .input-group label { font-weight: 600; color: #475569; font-size: 0.9rem; }
        .input-group input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; color: #1e293b; box-sizing: border-box; width: 100%; }
        .auth-btn { width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .auth-btn:hover { background: #4338ca; }
        .toggle-link { text-align: center; margin-top: 20px; color: #64748b; font-size: 0.9rem; }
        .toggle-link span { color: #4f46e5; cursor: pointer; font-weight: 600; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="mesh-auth-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <span style="font-size: 3rem;">🏥</span>
            <h2 id="auth-title" style="margin: 10px 0 5px 0; color: #0f172a; font-weight: 800;">Welcome Back</h2>
            <p id="auth-subtitle" style="margin: 0; color: #64748b;">Log in to access your clinical journal</p>
        </div>

        <form id="auth-form">
            <div class="input-group" id="name-group" style="display: none;">
                <label for="auth-name">Full Name</label>
                <input type="text" id="auth-name" placeholder="Radha Jindal">
            </div>

            <div class="input-group">
                <label for="auth-email">Email Address</label>
                <input type="email" id="auth-email" placeholder="name@domain.com" required>
            </div>

            <div class="input-group">
                <label for="auth-password">Password</label>
                <input type="password" id="auth-password" placeholder="••••••••" required>
            </div>

            <div id="clinical-profile-group" style="display: none; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div class="input-group" style="margin: 0;">
                    <label for="auth-height">Height (cm)</label>
                    <input type="number" id="auth-height" placeholder="165" min="1" max="300">
                </div>
                <div class="input-group" style="margin: 0;">
                    <label for="auth-weight">Weight (kg)</label>
                    <input type="number" id="auth-weight" placeholder="62" min="1" max="500">
                </div>
            </div>

            <button type="submit" class="auth-btn" id="submit-btn">Sign In</button>
        </form>

        <div class="toggle-link" id="auth-toggle-text">
            Don't have an account? <span id="toggle-action-btn">Create Profile</span>
        </div>
    </div>

    <script src="auth.js" defer></script>
</body>
</html>
