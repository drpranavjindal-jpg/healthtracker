<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Saathi - Secure Access</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); padding: 40px 24px; font-family: system-ui, sans-serif; margin: 0;">
    
    <div style="width: 100%; max-width: 480px; margin: 0 auto;">
        <div style="background: #ffffff; border-radius: 16px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);">
            
            <div style="text-align: center; margin-bottom: 30px;">
                <span style="font-size: 3.5rem; display: block; margin-bottom: 10px;">🏥</span>
                <h2 id="auth-title" style="font-size: 1.85rem; color: #1e293b; margin: 0 0 8px 0; font-weight: 800;">Welcome to Health Saathi</h2>
                <p id="auth-subtitle" style="color: #64748b; margin: 0; font-size: 0.95rem;">Sign in to view your health dashboard</p>
            </div>

            <form id="loginForm" onsubmit="handleLoginSubmit(event)" style="display: flex; flex-direction: column; gap: 20px;">
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="userEmail" style="font-weight: 600; color: #334155; font-size: 0.9rem;">Email Address</label>
                    <input type="email" id="userEmail" placeholder="name@example.com" required style="width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box;">
                </div>
                <button type="submit" style="width: 100%; padding: 14px; font-size: 1rem; font-weight: 700; color: white; background: #4f46e5; border: none; border-radius: 8px; cursor: pointer;">
                    Sign In to Dashboard
                </button>
                <p style="text-align: center; font-size: 0.95rem; color: #64748b; margin-top: 10px;">
                    New user? <a href="#" onclick="toggleAuthMode('signup')" style="color: #4f46e5; font-weight: 600; text-decoration: none;">Create a Profile</a>
                </p>
            </form>

            <form id="signupForm" onsubmit="handleSignUpSubmit(event)" style="display: none; flex-direction: column; gap: 20px;">
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="newName" style="font-weight: 600; color: #334155; font-size: 0.9rem;">Full Name</label>
                    <input type="text" id="newName" placeholder="Enter your full name" required style="width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label for="newEmail" style="font-weight: 600; color: #334155; font-size: 0.9rem;">Email Address</label>
                    <input type="email" id="newEmail" placeholder="name@example.com" required style="width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box;">
                </div>
                <button type="submit" style="width: 100%; padding: 14px; font-size: 1rem; font-weight: 700; color: white; background: #10b981; border: none; border-radius: 8px; cursor: pointer;">
                    Register & Create Profile
                </button>
                <p style="text-align: center; font-size: 0.95rem; color: #64748b; margin-top: 10px;">
                    Already have a profile? <a href="#" onclick="toggleAuthMode('login')" style="color: #4f46e5; font-weight: 600; text-decoration: none;">Sign In</a>
                </p>
            </form>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
