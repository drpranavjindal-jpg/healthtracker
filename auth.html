<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Saathi - Secure Access</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome to Health Saathi</h2>
            <p>Your secure, local health companion</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="userEmail">Email Address</label>
                    <input type="email" id="userEmail" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn btn-primary">Enter Dashboard</button>
            </form>
        </div>

        <footer class="auth-footer" style="margin-top: 20px; text-align: center;">
            <div class="privacy-notice-footer">
                <h4>🔒 Absolute Privacy</h4>
                <p>All your health metrics are stored <strong>locally on your device only</strong>.</p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
