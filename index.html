<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Saathi - Clinical Journal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc; color: #1e293b; font-family: system-ui, -apple-system, sans-serif;">

    <div class="mesh-layout" id="root-mesh-container" style="width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 30px; box-sizing: border-box;">
        
        <header style="display: flex; justify-content: space-between; align-items: center; background: white; padding: 25px 35px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); margin-bottom: 35px; gap: 20px; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; gap: 16px;">
                <span style="font-size: 2.5rem;">🏥</span>
                <div>
                    <h1 style="margin: 0; font-size: 1.85rem; font-weight: 800; color: #0f172a;">Health Saathi</h1>
                    <p style="margin: 2px 0 0 0; color: #64748b; font-size: 0.95rem;">AI Clinical Reporting System</p>
                </div>
            </div>
            <button onclick="clearActiveSession()" style="padding: 10px 20px; border-radius: 8px; font-weight: 600; background: #fee2e2; color: #ef4444; border: none; cursor: pointer;">Logout</button>
        </header>

        <nav style="display: flex; gap: 12px; margin-bottom: 35px; overflow-x: auto; padding-bottom: 5px;">
            <button id="btn-dashboard" onclick="switchTab('dashboard')" style="padding: 12px 24px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; background: #e0e7ff; color: #4f46e5;">📊 Dashboard</button>
            <button id="btn-vitals" onclick="switchTab('vitals')" style="padding: 12px 24px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; color: #64748b;">❤️ Vitals</button>
            <button id="btn-profile" onclick="switchTab('profile')" style="padding: 12px 24px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; color: #64748b;">👤 Profile</button>
            <button id="btn-food" onclick="switchTab('food')" style="padding: 12px 24px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; color: #64748b;">🍎 Food</button>
        </nav>

        <main>
            <div id="dashboard-tab">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; margin-bottom: 40px;">
                    <div style="background: white; padding: 35px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); text-align: center;">
                        <h2 id="dash-bp" style="margin: 0; font-size: 2.5rem; color: #1e293b;">120/80</h2>
                        <span style="color: #64748b;">Latest BP (mmHg)</span>
                    </div>
                </div>
            </div>

            <div id="profile-tab" style="display: none; margin-bottom: 40px;">
                <div style="padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); max-width: 500px;">
                    <h3 style="font-size: 1.6rem; margin-bottom: 25px;">Update Profile Metrics</h3>
                    <form id="metrics-update-form" style="display: flex; flex-direction: column; gap: 20px;">
                        <input type="number" id="update-age" placeholder="Age (years)" style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                        <input type="number" id="update-height" placeholder="Height (cm)" style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                        <input type="number" id="update-weight" placeholder="Weight (kg)" style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                        <button type="submit" style="padding: 14px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer;">Save Profile</button>
                    </form>
                </div>
            </div>

            <div id="printableReportArea" style="background: white; padding: 40px; border-radius: 16px; margin-top: 40px;">
                <h3 style="margin-bottom: 25px;">📋 Medical Diagnostic Report</h3>
                <ul id="insightsList"></ul>
                <div id="journeyLogHistory"></div>
            </div>
            <button onclick="downloadDoctorPDF()" style="margin-top:20px; padding: 15px 30px; background: #4f46e5; color:white; border:none; border-radius:8px; cursor:pointer;">📥 Export PDF</button>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
