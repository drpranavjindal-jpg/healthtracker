<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Saathi - Personal Health Journal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc; color: #1e293b; font-family: system-ui, -apple-system, sans-serif;">

    <div style="width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 30px; box-sizing: border-box;">
        
        <header style="display: flex; justify-content: space-between; align-items: center; background: white; padding: 25px 35px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); margin-bottom: 35px; gap: 20px; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; gap: 16px;">
                <span style="font-size: 2.5rem;">🏥</span>
                <div>
                    <h1 style="margin: 0; font-size: 1.85rem; font-weight: 800; color: #0f172a;">Health Saathi</h1>
                    <p style="margin: 2px 0 0 0; color: #64748b; font-size: 0.95rem;">Your Personal Health Journal</p>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="displayUserName" style="font-weight: 600; color: #334155; font-size: 1.05rem; background: #f1f5f9; padding: 8px 16px; border-radius: 9999px;">Guest User</span>
                <button onclick="clearActiveSession()" style="padding: 10px 20px; border-radius: 8px; font-weight: 600; background: #fee2e2; color: #ef4444; border: none; cursor: pointer;">Logout</button>
            </div>
        </header>

        <nav style="display: flex; gap: 12px; margin-bottom: 35px; overflow-x: auto; padding-bottom: 5px;">
            <button id="btn-dashboard" onclick="switchTab('dashboard')" style="padding: 12px 24px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; font-size: 1rem; background: #e0e7ff; color: #4f46e5;">📊 Dashboard</button>
            <button id="btn-vitals" onclick="switchTab('vitals')" style="padding: 12px 24px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; font-size: 1rem; background: transparent; color: #64748b;">❤️ Vitals</button>
            <button id="btn-food" onclick="switchTab('food')" style="padding: 12px 24px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; font-size: 1rem; background: transparent; color: #64748b;">🍎 Food Diary</button>
            <button id="btn-medicines" onclick="switchTab('medicines')" style="padding: 12px 24px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; font-size: 1rem; background: transparent; color: #64748b;">💊 Medicines</button>
        </nav>

        <main>
            <div id="dashboard-tab">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; margin-bottom: 40px;">
                    <div style="background: white; padding: 35px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); text-align: center;">
                        <p style="margin: 0 0 10px 0; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.85rem;">Latest BP</p>
                        <h2 id="dash-bp" style="margin: 0; font-size: 2.5rem; font-weight: 800; color: #1e293b;">120/80</h2>
                        <span style="color: #94a3b8; font-size: 0.9rem;">mmHg</span>
                    </div>
                    <div style="background: white; padding: 35px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); text-align: center;">
                        <p style="margin: 0 0 10px 0; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.85rem;">Blood Sugar</p>
                        <h2 id="dash-sugar" style="margin: 0; font-size: 2.5rem; font-weight: 800; color: #1e293b;">95</h2>
                        <span style="color: #94a3b8; font-size: 0.9rem;">mg/dL</span>
                    </div>
                </div>
            </div>

            <div id="vitals-tab" style="display: none; margin-bottom: 40px;">
                <div style="padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);">
                    <h3 style="font-size: 1.6rem; margin-bottom: 25px; font-weight: 700;">Log New Telemetry Vitals</h3>
                    <form id="vitals-form" style="display: flex; flex-direction: column; gap: 24px;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px;">
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                <label style="font-weight: 600; color: #475569;">Systolic BP (mmHg)</label>
                                <input type="number" id="vitals-systolic" placeholder="120" style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                <label style="font-weight: 600; color: #475569;">Diastolic BP (mmHg)</label>
                                <input type="number" id="vitals-diastolic" placeholder="80" style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                            </div>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 8px; max-width: 300px;">
                            <label style="font-weight: 600; color: #475569;">Blood Sugar (mg/dL)</label>
                            <input type="number" id="vitals-sugar" placeholder="95" style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px;">
                        </div>
                        <button type="submit" style="padding: 14px 28px; font-weight: 700; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; align-self: flex-start;">Save Vitals Entry</button>
                    </form>
                </div>
            </div>

            <div id="food-tab" style="display: none; margin-bottom: 40px;">
                <div style="padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);">
                    <h3 style="font-size: 1.6rem; margin-bottom: 25px; font-weight: 700;">Log Food Consumption</h3>
                    <form id="food-form" style="display: flex; flex-direction: column; gap: 24px;">
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            <label style="font-weight: 600; color: #475569;">Meal Details</label>
                            <input type="text" id="food-desc" placeholder="e.g. Oats with fresh milk and fruit" style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                        </div>
                        <button type="submit" style="padding: 14px 28px; font-weight: 700; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; align-self: flex-start;">Save Food Log</button>
                    </form>
                </div>
            </div>

            <div id="medicines-tab" style="display: none; margin-bottom: 40px;">
                <div style="padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);">
                    <h3 style="font-size: 1.6rem; margin-bottom: 25px; font-weight: 700;">Add Medication Plan</h3>
                    <form id="med-form" style="display: flex; flex-direction: column; gap: 24px;">
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            <label style="font-weight: 600; color: #475569;">Medicine Name</label>
                            <input type="text" id="med-name" placeholder="e.g. Metformin 500mg" style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                        </div>
                        <button type="submit" style="padding: 14px 28px; font-weight: 700; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; align-self: flex-start;">Schedule Medication</button>
                    </form>
                </div>
            </div>

            <div style="background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); margin-top: 35px;">
                <h3 style="font-size: 1.5rem; color: #0f172a; margin: 0 0 20px 0; font-weight: 700; display: flex; align-items: center; gap: 10px;">📖 Your Health Journey History</h3>
                <div id="journeyLogHistory" style="display: flex; flex-direction: column; gap: 14px;">
                    <p style="color: #64748b; font-style: italic; margin: 0;" id="empty-log-msg">No journey logs saved yet. Submit any form tab above to compile your records!</p>
                </div>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
