<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Health Saathi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        .tab-section { display: none; padding: 20px; border: 1px solid #ccc; margin-top: 10px; }
        .active { display: block; }
        nav { margin-bottom: 20px; }
        button { padding: 10px; cursor: pointer; }
        #printable-area { border: 2px solid #000; padding: 20px; margin-top: 30px; }
    </style>
</head>
<body>

    <h1>Health Saathi</h1>
    
    <nav>
        <button onclick="switchTab('vitals-section')">Vitals (BP/Sugar)</button>
        <button onclick="switchTab('food-section')">Food</button>
        <button onclick="switchTab('med-section')">Medicine</button>
    </nav>

    <div id="vitals-section" class="tab-section active">
        <h3>Log Vitals</h3>
        <input type="text" id="bp" placeholder="BP (e.g., 120/80)">
        <input type="text" id="sugar" placeholder="Sugar (e.g., 110)">
        <button onclick="saveVitals()">Save Vitals</button>
    </div>

    <div id="food-section" class="tab-section">
        <h3>Log Food</h3>
        <input type="text" id="food" placeholder="Food Name">
        <button onclick="saveFood()">Save Food</button>
    </div>

    <div id="med-section" class="tab-section">
        <h3>Log Medicine</h3>
        <input type="text" id="med" placeholder="Medicine Name">
        <button onclick="saveMed()">Save Medicine</button>
    </div>

    <div id="printable-area">
        <h3>Medical Report</h3>
        <div id="report-content"></div>
    </div>
    <br>
    <button onclick="exportPDF()" style="background: green; color: white; padding: 15px;">Download PDF</button>

    <script src="script.js"></script>
</body>
</html>
