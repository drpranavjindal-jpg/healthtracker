<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Saathi - Clinical Journal</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container" id="pdf-container">
    <header>
        <h2>Health Saathi</h2>
        <p>Official Clinical Record</p>
    </header>

    <nav id="no-print-nav">
        <button onclick="switchTab('dash', this)" class="active-btn">Journal</button>
        <button onclick="switchTab('vitals', this)">Vitals</button>
        <button onclick="switchTab('meds', this)">Meds</button>
    </nav>

    <div id="dash" class="tab-section active">
        <div class="profile-card" id="profile-display"><strong>Profile:</strong> Not set</div>
        <h3 style="color: var(--primary-color);">Patient History</h3>
        
        <div id="history-list"></div>
        
        <button onclick="generateMeshInsight()" class="action" style="background: linear-gradient(135deg, #667eea, #764ba2);">
            🧠 Generate AI Summary (Mesh API)
        </button>
        <div id="ai-insight-box" style="display:none; margin-top: 15px; padding: 15px; background: #f0fdf4; border-left: 5px solid #10b981; border-radius: 8px;"></div>

        <button onclick="exportPDF()" class="action" id="no-print-btn" style="background: #059669; margin-top:15px;">Download Report (PDF)</button>
    </div>

    <div id="vitals" class="tab-section">
        <h3>Patient Metrics</h3>
        <input type="number" id="height" placeholder="Height (cm)">
        <input type="number" id="weight" placeholder="Weight (kg)">
        <input type="text" id="bp" placeholder="BP (e.g., 120/80)">
        <input type="text" id="sugar" placeholder="Sugar (mg/dL)">
        <button class="action" onclick="saveVitals()">Save Metrics</button>
    </div>

    <div id="meds" class="tab-section">
        <h3>Log Medication</h3>
        <input type="text" id="med" placeholder="Medicine Name & Dosage">
        <button class="action" onclick="saveMeds()">Save Medication</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
