<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Saathi - Clinical Journal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-section { display: none; padding: 20px 0; }
        .active { display: block; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        nav button { padding: 10px 15px; cursor: pointer; border: none; background: #e2e8f0; border-radius: 6px; font-weight: 600; }
        nav button.active-btn { background: #2563eb; color: white; }
        .log-row { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .timestamp { font-size: 0.8em; color: #666; }
        input { width: 100%; padding: 12px; margin: 8px 0 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        button.action { width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 6px; background: #2563eb; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Health Saathi</h1>
    <nav>
        <button onclick="switchTab('dash', this)" class="active-btn">History</button>
        <button onclick="switchTab('vitals', this)">Vitals</button>
        <button onclick="switchTab('meds', this)">Meds</button>
    </nav>

    <div id="dash" class="tab-section active">
        <h2>Clinical Journal</h2>
        <div id="history-list"></div>
        <button onclick="exportPDF()" style="margin-top:20px; background:green; color:white; padding:12px; border:none; width:100%; border-radius:6px; cursor:pointer;">Download PDF Report</button>
    </div>

    <div id="vitals" class="tab-section">
        <h3>Log Vitals</h3>
        <input type="text" id="bp" placeholder="Blood Pressure (e.g. 120/80)">
        <input type="text" id="sugar" placeholder="Blood Sugar (mg/dL)">
        <button class="action" onclick="saveVitals()">Save Vitals</button>
    </div>

    <div id="meds" class="tab-section">
        <h3>Log Medication</h3>
        <input type="text" id="med" placeholder="Medicine Name & Dosage">
        <button class="action" onclick="saveMeds()">Save Medication</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
